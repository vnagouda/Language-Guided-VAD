# =============================================================================
# Language-Guided Weakly Supervised VAD — Central Configuration
# =============================================================================

# --- Reproducibility ---
seed: 42

# --- Data Paths ---
data:
  raw_dir: "data/raw"
  features_dir: "data/features"
  annotation_file: "data/Temporal_Anomaly_Annotation.txt"
  frame_extensions:
    - ".png"
    - ".jpg"

# --- Feature Extraction ---
extraction:
  num_segments: 32
  frames_per_segment: 1
  clip_model_name: "openai/clip-vit-base-patch16"
  blip2_model_name: "Salesforce/blip2-opt-2.7b"
  image_size: 224
  extraction_batch_size: 16

# --- Model Architecture ---
model:
  feature_dim: 512
  num_segments: 32
  num_heads: 8
  num_layers: 1
  dropout: 0.5
  ff_dim: 2048
  classifier_hidden_dim: 128

# --- Loss Function ---
loss:
  top_k: 8   # unused in AIS, kept for compatibility
  margin: 1.0
  lambda_smooth: 8.0e-5
  lambda_sparse: 8.0e-5

  # 🔥 AIS temperature schedule (UPDATED for long training)
  tau_initial: 1.0
  tau_final: 0.07
  tau_decay_epochs: 50   # IMPORTANT: slower decay

# --- Training ---
training:
  batch_size: 32
  learning_rate: 1.0e-4
  weight_decay: 5.0e-4

  # 🔥 FULL TRAINING
  epochs: 100

  lr_scheduler:
    step_size: 50
    gamma: 0.1

  checkpoint_dir: "checkpoints"
  log_interval: 10

# --- Evaluation ---
evaluation:
  results_dir: "results"